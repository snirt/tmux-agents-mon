# Claude Code — rules ported from herdr src/detect/manifests/claude.toml
AGENT_BINS="claude claude-code"

# title spinner (Braille) while working; "esc to interrupt" hint in prompt box
WORKING_TITLE='^[⠀-⣿] '
WORKING_SCREEN='esc to interrupt|ctrl\+c to interrupt'

# bare ❯ prompt line = idle; checked before blocked so an answered permission
# prompt lingering on screen doesn't read as blocked (herdr's not-guard)
IDLE_SCREEN='^[[:space:]]*❯[[:space:]]*$'

BLOCKED_SCREEN='do you want to proceed\?|waiting for permission|do you want to allow this connection\?|tab to amend|ctrl\+e to explain|enter to select.*esc to cancel|esc to cancel.*enter to select|run a dynamic workflow\?'

# working beats blocked: spinner/interrupt hint is authoritative (herdr priorities)
CHECK_ORDER="wt ws is bs"

# sidebar subject line: drop leading status glyph (✳ idle family, Braille spinner)
TITLE_STRIP='^[⠀-⣿✳✢✶✻✽·∗+] '
