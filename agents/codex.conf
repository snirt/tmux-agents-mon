# Codex CLI — rules ported from herdr src/detect/manifests/codex.toml
AGENT_BINS="codex"

BLOCKED_TITLE='Action Required'
WORKING_TITLE='^[⠀-⣿] '
BLOCKED_SCREEN='press enter to confirm or esc to cancel|enter to submit answer|enter to submit all|allow command\?|\[y/n\]|yes \(y\)'
WORKING_SCREEN='esc to interrupt'

# herdr: blocked title (1100) > working title (1050) > screen blockers
CHECK_ORDER="bt wt bs ws"

TITLE_STRIP='^[⠀-⣿] '
# idle codex titles the pane with the dir; last "› prompt" on screen is the subject
SUBJECT_SCREEN='^[[:space:]]*› (.+)$'
