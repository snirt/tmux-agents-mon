# herdr: blocked title (1100) > working title (1050) > screen blockers
CHECK_ORDER="bt wt bs ws"

TITLE_STRIP='^[⠀⠁⠂⠃⠄⠅⠆⠇⠈⠉⠊⠋⠌⠍⠎⠏⠐⠑⠒⠓⠔⠕⠖⠗⠘⠙⠚⠛⠜⠝⠞⠟⠠⠡⠢⠣⠤⠥⠦⠧⠨⠩⠪⠫⠬⠭⠮⠯⠰⠱⠲⠳⠴⠵⠶⠷⠸⠹⠺⠻⠼⠽⠾⠿⡀⡁⡂⡃⡄⡅⡆⡇⡈⡉⡊⡋⡌⡍⡎⡏⡐⡑⡒⡓⡔⡕⡖⡗⡘⡙⡚⡛⡜⡝⡞⡟⡠⡡⡢⡣⡤⡥⡦⡧⡨⡩⡪⡫⡬⡭⡮⡯⡰⡱⡲⡳⡴⡵⡶⡷⡸⡹⡺⡻⡼⡽⡾⡿⢀⢁⢂⢃⢄⢅⢆⢇⢈⢉⢊⢋⢌⢍⢎⢏⢐⢑⢒⢓⢔⢕⢖⢗⢘⢙⢚⢛⢜⢝⢞⢟⢠⢡⢢⢣⢤⢥⢦⢧⢨⢩⢪⢫⢬⢭⢮⢯⢰⢱⢲⢳⢴⢵⢶⢷⢸⢹⢺⢻⢼⢽⢾⢿⣀⣁⣂⣃⣄⣅⣆⣇⣈⣉⣊⣋⣌⣍⣎⣏⣐⣑⣒⣓⣔⣕⣖⣗⣘⣙⣚⣛⣜⣝⣞⣟⣠⣡⣢⣣⣤⣥⣦⣧⣨⣩⣪⣫⣬⣭⣮⣯⣰⣱⣲⣳⣴⣵⣶⣷⣸⣹⣺⣻⣼⣽⣾⣿] '
# idle codex titles the pane with the dir. The screen is no help: the composer
# renders "› <rotating placeholder>" below the transcript, so a last-"› ..."
# scrape always returns the placeholder, never the user's message. Pull the
# first real user message from the newest rollout for the pane's cwd instead.
# ponytail: newest-rollout-by-cwd heuristic; wrong pick if two codex sessions share a cwd
SUBJECT_CMD='for f in $(ls -t "$HOME/.codex/sessions"/*/*/*/rollout-*.jsonl 2>/dev/null | head -n 20); do
    head -n 1 "$f" | grep -qF "\"cwd\":\"$path\"" || continue
    s=$(grep "\"role\":\"user\"" "$f" | sed -nE "s/.*\"text\":\"([^<\"][^\"\\\\]*).*/\1/p" | head -n 1)
    [ -n "$s" ] && { printf "%s\n" "$s"; break; }
  done'
