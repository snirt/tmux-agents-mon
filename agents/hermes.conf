# Hermes — rules ported from herdr website/agent-detection/hermes.toml
AGENT_BINS="hermes hermes-agent"

BLOCKED_SCREEN='dangerous command|allow once|allow for this session|enter to confirm|↑/↓ to select|show full command'
WORKING_SCREEN='msg=interrupt|ctrl\+c cancel'

# Hermes leaves the shell prompt in pane_title ("~/repo> hermes"); discard it
# so SUBJECT_CMD below can provide the real chat title.
TITLE_STRIP='^.*> '

CHECK_ORDER="bs ws"

# subject line: newest Hermes session title for the pane cwd
# ponytail: cwd heuristic; wrong pick if two Hermes sessions share a cwd
SUBJECT_CMD='db="$HOME/.hermes/state.db"
  command -v sqlite3 >/dev/null 2>&1 && [ -r "$db" ] && sqlite3 -readonly "$db" <<EOF
.parameter init
.parameter set @cwd "$path"
SELECT COALESCE(NULLIF(title, ""), NULLIF(display_name, ""))
FROM sessions
WHERE cwd = @cwd
ORDER BY started_at DESC
LIMIT 1;
EOF'
